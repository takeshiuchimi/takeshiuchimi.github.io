<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Ca&co レコード</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1008;--bg2:#241508;--bg3:#2e1c0a;--bg4:#3a2510;
  --gold:#c9a84c;--gold2:#f0c96e;--amber:#e8a020;
  --text:#f0e8d8;--muted:#a08060;--muted2:#c0a070;--border:#3a2a18;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;padding-bottom:80px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}

header{background:linear-gradient(180deg,#0e0804,#1a1008);border-bottom:2px solid rgba(201,168,76,0.4);padding:16px 20px 12px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.6);}
.logo{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:5px;color:var(--muted2);text-transform:uppercase;margin-bottom:3px;font-style:italic;}
header h1{font-size:24px;font-weight:600;color:var(--text);letter-spacing:3px;font-family:'Cormorant Garamond',serif;}
header h1 em{color:var(--gold2);font-style:normal;}
.vbadge{font-size:9px;letter-spacing:2px;color:var(--muted);border:1px solid var(--border);padding:2px 10px;border-radius:20px;margin-top:5px;display:inline-block;}
.back-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:11px;letter-spacing:1px;text-decoration:none;opacity:0.7;}

.wrap{max-width:480px;margin:0 auto;padding:20px 16px;position:relative;z-index:1;}

.art-wrap{text-align:center;margin-bottom:20px;}
.art-img{width:200px;height:200px;border-radius:50%;object-fit:cover;border:3px solid rgba(201,168,76,0.4);box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 30px rgba(201,168,76,0.15);}
.art-img{animation:spin 8s linear infinite;animation-play-state:paused;}
.art-img.spinning{animation-play-state:running;}
@keyframes spin{to{transform:rotate(360deg);}}

.now-playing{background:var(--bg2);border:1px solid rgba(201,168,76,0.3);border-radius:var(--radius);padding:18px 16px;margin-bottom:14px;position:relative;overflow:hidden;}
.now-playing::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--amber),var(--gold));}
.np-label{font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;font-family:'Cormorant Garamond',serif;}
.np-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.4;}
.np-artist{font-size:12px;color:var(--muted2);font-family:'Cormorant Garamond',serif;font-style:italic;margin-bottom:14px;}

.progress-wrap{margin-bottom:14px;}
.progress-bar{width:100%;height:4px;background:var(--bg4);border-radius:2px;cursor:pointer;position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--amber));border-radius:2px;width:0%;}
.progress-dot{width:12px;height:12px;background:var(--gold2);border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);left:0%;box-shadow:0 0 8px rgba(240,201,110,0.7);}
.time-row{display:flex;justify-content:space-between;margin-top:6px;font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted);}

.controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:14px;}
.ctrl-btn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:22px;padding:8px;transition:color 0.15s;}
.ctrl-btn:hover{color:var(--gold2);}
.ctrl-play{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--amber));border:none;color:#1a1008;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 4px 16px rgba(201,168,76,0.4);}
.ctrl-play:hover{transform:scale(1.05);}

.volume-row{display:flex;align-items:center;gap:10px;}
.vol-icon{font-size:13px;color:var(--muted);}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--bg4);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;}

/* LYRICS KARAOKE */
.lyrics-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.lyrics-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:pointer;}
.lyrics-label{font-size:10px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;font-family:'Cormorant Garamond',serif;}
.lyrics-arrow{color:var(--gold);font-size:13px;transition:transform 0.3s;}
.lyrics-arrow.open{transform:rotate(180deg);}
.lyrics-body{display:none;height:220px;overflow:hidden;padding:0;scrollbar-width:none;position:relative;}
.lyrics-body::-webkit-scrollbar{display:none;}
.lyrics-body.open{display:block;}
.lyrics-inner{transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);padding-top:88px;padding-bottom:88px;}
.lyrics-line{padding:9px 18px;font-size:13px;color:rgba(160,128,96,0.5);line-height:1.8;transition:all 0.4s;text-align:center;cursor:pointer;height:44px;display:flex;align-items:center;justify-content:center;}
.lyrics-line:hover{color:var(--muted2);}
.lyrics-line.active{color:var(--gold2);font-size:15px;font-weight:700;text-shadow:0 0 16px rgba(240,201,110,0.4);}
.lyrics-line.near{color:var(--muted2);font-size:13px;}
.lyrics-line.passed{color:rgba(160,128,96,0.3);}
.lyrics-empty{font-size:12px;color:var(--muted);text-align:center;padding:20px;}

/* PLAYLIST */
.playlist{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.playlist-header{padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;font-family:'Cormorant Garamond',serif;}
.track{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.2s;}
.track:last-child{border-bottom:none;}
.track:hover{background:rgba(201,168,76,0.05);}
.track.active{background:rgba(201,168,76,0.08);}
.track-art{width:42px;height:42px;border-radius:6px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;}
.track-num{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--muted);min-width:20px;text-align:center;}
.track.active .track-num{color:var(--gold2);}
.track-info{flex:1;min-width:0;}
.track-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.track.active .track-title{color:var(--gold2);}
.track-sub{font-size:11px;color:var(--muted2);font-family:'Cormorant Garamond',serif;font-style:italic;}
.track-dur{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--muted);flex-shrink:0;}

footer{text-align:center;padding:20px;font-size:10px;color:var(--muted);letter-spacing:1px;line-height:2;position:relative;z-index:1;}
footer em{color:var(--gold);font-style:normal;}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="../index.html">‹ TOP</a>
  <div class="logo">Nigatake · Music Label</div>
  <h1>Ca&amp;<em>co</em> レコード</h1>
  <div class="vbadge">Snack Bar Nigatake</div>
</header>
<div class="wrap">
  <div class="art-wrap">
    <img class="art-img" id="art-img" src="" alt="album art">
  </div>
  <div class="now-playing">
    <div class="np-label">♪ Now Playing</div>
    <div class="np-title" id="np-title">曲を選んでください</div>
    <div class="np-artist" id="np-artist">Ca&amp;co Snack Bar Nigatake</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="prog-bar" onclick="seek(event)">
        <div class="progress-fill" id="prog-fill"></div>
        <div class="progress-dot" id="prog-dot"></div>
      </div>
      <div class="time-row"><span id="t-cur">0:00</span><span id="t-dur">0:00</span></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="ctrl-play" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
    </div>
    <div class="volume-row">
      <span class="vol-icon">🔈</span>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8" oninput="setVol(this.value)">
      <span class="vol-icon">🔊</span>
    </div>
  </div>

  <div class="lyrics-card">
    <div class="lyrics-header" onclick="toggleLyrics()">
      <span class="lyrics-label">🎤 歌詞</span>
      <span class="lyrics-arrow" id="lyrics-arrow">▼</span>
    </div>
    <div class="lyrics-body" id="lyrics-body">
      <div class="lyrics-empty" id="lyrics-empty">曲を選ぶと歌詞が表示されます</div>
      <div id="lyrics-lines"></div>
    </div>
  </div>

  <div class="playlist">
    <div class="playlist-header">Playlist — 3 Tracks</div>
    <div id="playlist-items"></div>
  </div>
</div>
<footer>🎵 <em>Ca&amp;co レコード</em> — Snack Bar Nigatake</footer>

  },
];

let cur=-1, playing=false, curLyricIdx=-1;
const audio = new Audio();
audio.volume = 0.8;

// Build playlist
const pl = document.getElementById('playlist-items');
TRACKS.forEach((t,i) => {
  pl.innerHTML += `<div class="track" id="track${i}" onclick="selectTrack(${i})">
    <div class="track-num">${i+1}</div>
    <img class="track-art" src="${t.art}" alt="art">
    <div class="track-info">
      <div class="track-title">${t.title}</div>
      <div class="track-sub">${t.artist}</div>
    </div>
    <div class="track-dur" id="dur${i}">—</div>
  </div>`;
  const a = new Audio(t.src);
  a.addEventListener('loadedmetadata', () => {
    document.getElementById(`dur${i}`).textContent = fmt(a.duration);
  });
});

document.getElementById('art-img').src = TRACKS[0].art;

audio.addEventListener('timeupdate', () => {
  updateProgress();
  updateLyrics();
});
audio.addEventListener('ended', nextTrack);

function buildLyrics(n) {
  const lines = TRACKS[n].lyrics;
  const container = document.getElementById('lyrics-lines');
  const empty = document.getElementById('lyrics-empty');
  container.innerHTML = '';
  curLyricIdx = -1;

  if (!lines || lines.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const inner = document.createElement('div');
  inner.id = 'lyrics-inner';
  inner.className = 'lyrics-inner';
  lines.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'lyrics-line';
    div.id = `lyric${i}`;
    div.textContent = l.text;
    div.onclick = () => { audio.currentTime = l.time; };
    inner.appendChild(div);
  });
  container.appendChild(inner);
}

function updateLyrics() {
  const t = cur >= 0 ? TRACKS[cur] : null;
  if (!t || !t.lyrics || t.lyrics.length === 0) return;

  const now = audio.currentTime;
  const lines = t.lyrics;

  let idx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (now >= lines[i].time) idx = i;
    else break;
  }

  if (idx === curLyricIdx) return;
  curLyricIdx = idx;

  document.querySelectorAll('.lyrics-line').forEach((el, i) => {
    el.classList.remove('active', 'near', 'passed');
    if (i === idx) el.classList.add('active');
    else if (i === idx-1 || i === idx+1) el.classList.add('near');
    else if (i < idx) el.classList.add('passed');
  });

  // Scroll: move inner div so active line stays at center (3rd row)
  const LINE_H = 44;
  const inner = document.getElementById('lyrics-inner');
  if (inner && idx >= 0) {
    const offset = idx * LINE_H;
    inner.style.transform = `translateY(-${offset}px)`;
  }
}

function selectTrack(n) {
  cur = n;
  const t = TRACKS[n];
  audio.src = t.src;
  audio.play();
  playing = true;
  document.getElementById('np-title').textContent = t.title;
  document.getElementById('np-artist').textContent = t.artist;
  document.getElementById('art-img').src = t.art;
  buildLyrics(n);
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('t-dur').textContent = fmt(audio.duration);
  }, {once:true});
  updateUI();
}

function toggleLyrics() {
  document.getElementById('lyrics-body').classList.toggle('open');
  document.getElementById('lyrics-arrow').classList.toggle('open');
}

function togglePlay() {
  if (cur < 0) { selectTrack(0); return; }
  if (playing) { audio.pause(); playing=false; }
  else { audio.play(); playing=true; }
  updateUI();
}

function prevTrack() { selectTrack(cur<=0 ? TRACKS.length-1 : cur-1); }
function nextTrack() { selectTrack(cur>=TRACKS.length-1 ? 0 : cur+1); }

function seek(e) {
  const bar = document.getElementById('prog-bar');
  audio.currentTime = audio.duration * (e.offsetX / bar.offsetWidth);
}
function setVol(v) { audio.volume = v; }

function updateProgress() {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-dot').style.left = pct + '%';
  document.getElementById('t-cur').textContent = fmt(audio.currentTime);
}

function updateUI() {
  document.getElementById('play-btn').textContent = playing ? '⏸' : '▶';
  document.getElementById('art-img').classList.toggle('spinning', playing);
  document.querySelectorAll('.track').forEach((el,i) => el.classList.toggle('active', i===cur));
}

function fmt(s) {
  if (!s||isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}
</script>
