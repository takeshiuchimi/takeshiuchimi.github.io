<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚾ 呑蔵野球</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Oswald:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14;--bg2:#111820;--bg3:#1a2330;--bg4:#222f3e;
  --green:#2ecc71;--green2:#27ae60;--gold:#f0c96e;--gold2:#c9a84c;
  --red:#e74c3c;--blue:#3498db;--text:#e8f0f8;--muted:#7a8a9a;--border:#1e2d3d;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;padding-bottom:60px;}

/* FIELD TEXTURE */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(46,204,113,0.015) 40px,rgba(46,204,113,0.015) 41px);
  pointer-events:none;z-index:0;
}

/* HEADER */
header{
  background:linear-gradient(180deg,#060a0f 0%,#0d1520 100%);
  border-bottom:3px solid var(--green2);
  padding:16px 20px 12px;text-align:center;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.logo{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:5px;color:var(--green);text-transform:uppercase;margin-bottom:3px;opacity:0.7;}
header h1{font-size:26px;font-weight:900;color:var(--text);letter-spacing:2px;font-family:'Oswald',sans-serif;}
header h1 em{color:var(--green);font-style:normal;}
.vbadge{font-size:9px;letter-spacing:2px;color:var(--muted);border:1px solid var(--border);padding:2px 10px;border-radius:20px;margin-top:5px;display:inline-block;text-transform:uppercase;}
.back-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--green);font-size:11px;letter-spacing:1px;text-decoration:none;opacity:0.7;}

/* CONTAINER */
.wrap{max-width:480px;margin:0 auto;padding:20px 14px;position:relative;z-index:1;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px;}
.search-box{
  width:100%;background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-family:'Noto Serif JP',serif;font-size:15px;
  padding:14px 50px 14px 16px;transition:border-color 0.2s;
}
.search-box:focus{outline:none;border-color:var(--green);}
.search-box::placeholder{color:var(--muted);}
.search-btn{
  position:absolute;right:0;top:0;bottom:0;width:50px;
  background:var(--green2);border:none;border-radius:0 var(--radius) var(--radius) 0;
  color:#fff;font-size:18px;cursor:pointer;transition:background 0.2s;
}
.search-btn:hover{background:var(--green);}

/* HINT */
.hint{font-size:11px;color:var(--muted);text-align:center;margin-bottom:16px;line-height:1.8;}
.hint em{color:var(--green);font-style:normal;}

/* CANDIDATES */
.candidates{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.candidates-title{font-size:10px;letter-spacing:3px;color:var(--green);text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg3);}
.candidate-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;
}
.candidate-item:last-child{border-bottom:none;}
.candidate-item:hover{background:var(--bg3);}
.cand-num{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--green);min-width:24px;}
.cand-name{font-size:14px;font-weight:700;color:var(--text);}
.cand-team{font-size:11px;color:var(--muted);margin-top:2px;}

/* PLAYER CARD */
.player-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;position:relative;}
.player-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green2),var(--blue));}

.player-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.player-entry{font-size:11px;color:var(--muted);margin-bottom:4px;}
.player-name{font-size:22px;font-weight:900;color:var(--text);line-height:1.2;margin-bottom:4px;}
.player-pos{font-size:12px;color:var(--green);letter-spacing:1px;}

.player-body{padding:14px 16px;}

/* RANK ROW */
.rank-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.rank-val{font-family:'Oswald',sans-serif;font-size:28px;font-weight:900;color:var(--gold);}
.rank-label{font-size:10px;color:var(--muted);margin-top:2px;}
.salary{text-align:right;}
.salary-val{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--text);}
.salary-label{font-size:10px;color:var(--muted);}

/* STATS */
.stat-row{padding:10px 0;border-bottom:1px solid var(--border);}
.stat-label{font-size:10px;letter-spacing:2px;color:var(--green);text-transform:uppercase;margin-bottom:6px;}
.stat-val{font-family:'Oswald',sans-serif;font-size:16px;color:var(--text);letter-spacing:1px;}

/* AWARD */
.award-row{padding:10px 0;border-bottom:1px solid var(--border);}
.award-val{font-size:13px;color:var(--gold);line-height:1.8;}

/* SONG */
.song-row{padding:10px 0;}
.song-val{font-size:13px;color:var(--text);font-style:italic;line-height:1.8;}

/* SUB COMMANDS */
.sub-cmds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:14px;}
.sub-btn{
  padding:9px 4px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-family:'Noto Serif JP',serif;
  font-size:11px;cursor:pointer;text-align:center;transition:all 0.15s;
}
.sub-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--green);}
.sub-btn.active{background:rgba(46,204,113,0.1);color:var(--green);border-color:var(--green);}

/* SUB PANEL */
.sub-panel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-top:10px;}
.sub-panel-title{font-size:10px;letter-spacing:3px;color:var(--green);text-transform:uppercase;margin-bottom:10px;}
.sub-panel p{font-size:13px;line-height:1.9;color:var(--text);}
.sub-panel ul{list-style:none;padding:0;}
.sub-panel ul li{font-size:13px;line-height:1.9;color:var(--text);padding:4px 0 4px 14px;position:relative;}
.sub-panel ul li::before{content:'▸';position:absolute;left:0;color:var(--green);font-size:10px;top:6px;}

/* LOADING */
.loading{display:none;text-align:center;padding:40px 0;}
.loading.on{display:block;}
.ring{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{color:var(--green);font-size:13px;letter-spacing:2px;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* RESET BTN */
.reset-btn{display:block;width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);font-family:'Noto Serif JP',serif;font-size:12px;cursor:pointer;text-align:center;margin-top:10px;transition:all 0.15s;}
.reset-btn:hover{border-color:var(--green);color:var(--green);}

/* SCORE BAR */
.score-bar-wrap{display:flex;align-items:center;gap:10px;margin-top:6px;}
.score-bar{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.score-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green2),var(--gold));transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}

footer{text-align:center;padding:20px;font-size:10px;color:var(--muted);letter-spacing:1px;line-height:2;position:relative;z-index:1;}
footer em{color:var(--green);font-style:normal;}
</style>
</head>
<body>

<header>
  <a class="back-btn" href="../index.html">‹ TOP</a>
  <div class="logo">Nomuzo · Baseball Analysis</div>
  <h1>⚾ 呑蔵<em>野球</em></h1>
  <div class="vbadge">内海メソッド v1.0</div>
</header>

<div class="wrap">

  <!-- SEARCH -->
  <div class="search-wrap">
    <input class="search-box" id="search" type="text" placeholder="選手名を入力（例：島内、大谷、田中将）"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">⚾</button>
  </div>
  <div class="hint">
    選手名・ニックネーム・連想ワードでもOK<br>
    例：<em>マー君</em>　<em>ハム田中</em>　<em>楽天のエース</em>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="ring"></div>
    <div class="ltxt">内海メソッド 解析中…</div>
  </div>

  <!-- RESULT AREA -->
  <div id="result"></div>

</div>

<footer>⚾ <em>呑蔵野球</em> — 内海メソッドによる選手評価<br>データはAIによる参考値です。正確な情報は公式サイトをご確認ください。</footer>

<script>
let currentPlayer = null;
let currentSubCmd = null;
let conversationHistory = [];

const SYSTEM_PROMPT = `日本プロ野球選手を評価するアシスタントです。必ずJSONのみで返してください。マークダウンやコードブロックは使わないでください。

選手が特定できた場合のJSON形式:
{"type":"player","name":"選手名","entry":"入団経緯(例:楽11年D6)","position":"ポジション","team":"所属球団","rank":"評価(例:1.50軍)","salary":"最高年俸(例:1.2億(2021年))","stats":"成績","awards":"受賞歴","song":"応援歌冒頭2フレーズ+...","retired":false}

候補が複数の場合:
{"type":"candidates","candidates":[{"num":1,"name":"選手名","team":"球団"},{"num":2,"name":"選手名","team":"球団"}]}

評価基準:
1.00軍=1軍基準 / 1.20軍=主力 / 1.50軍=1軍半 / 1.80軍=控え / 2.00軍=非主力
島内宏明は必ず1.50軍固定。
引退5年以上はrank="-"、salary=null。
JSONのみ返すこと。説明不要。`;

async function callClaude(userMsg) {
  conversationHistory.push({role:'user', content: userMsg});

  const API_KEY = 'AIzaSyCNVScdumnnMq48Vk_sEfijTx2DVkWU1Gg';
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

  const contents = conversationHistory.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{text: m.content}]
  }));

  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      system_instruction: {parts: [{text: SYSTEM_PROMPT}]},
      contents: contents,
      generationConfig: {maxOutputTokens: 1000, temperature: 0.3}
    })
  });
  const d = await r.json();
  // Debug: show full response
  const debugStr = JSON.stringify(d).substring(0, 500);
  const text = d.candidates?.[0]?.content?.parts?.[0]?.text || 
               d.candidates?.[0]?.content?.parts?.[0]?.text ||
               d.error?.message || '{}';
  conversationHistory.push({role:'assistant', content: text});
  return text;
}

async function doSearch() {
  const q = document.getElementById('search').value.trim();
  if(!q) return;

  conversationHistory = [];
  currentPlayer = null;
  currentSubCmd = null;

  setLoading(true);
  document.getElementById('result').innerHTML = '';

  try {
    const raw = await callClaude(q);
    const data = extractJSON(raw);
    if(data.type === 'candidates') renderCandidates(data);
    else if(data.type === 'player') renderPlayer(data);
  } catch(e) {
    document.getElementById('result').innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted);">エラー：${e.message}</div>`;
  } finally {
    setLoading(false);
  }
}

async function selectCandidate(name) {
  conversationHistory = [];
  currentSubCmd = null;
  setLoading(true);
  document.getElementById('result').innerHTML = '';
  try {
    const raw = await callClaude(name);
    const data = extractJSON(raw);
    if(data.type === 'player') renderPlayer(data);
  } catch(e) {
    document.getElementById('result').innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted);">データを取得できませんでした</div>`;
  } finally {
    setLoading(false);
  }
}

async function doSubCmd(cmd, label) {
  if(!currentPlayer) return;
  currentSubCmd = cmd;

  // Update button states
  document.querySelectorAll('.sub-btn').forEach((b,i) => b.classList.toggle('active', i === cmd-1));

  const prompts = {
    1: `${currentPlayer.name}の学歴・社会人経歴を教えてください。JSONで{"type":"sub","title":"学歴・社会人","content":"内容"}で返してください。`,
    2: `${currentPlayer.name}の評価理由を内海メソッドに基づいて説明してください。JSONで{"type":"sub","title":"評価理由","content":"内容"}で返してください。`,
    3: `${currentPlayer.name}のキャリア要約を教えてください。JSONで{"type":"sub","title":"キャリア要約","content":"内容"}で返してください。`,
    4: `${currentPlayer.name}のタイプ分類（打撃型・守備型・走塁型など）を教えてください。JSONで{"type":"sub","title":"タイプ分類","content":"内容"}で返してください。`,
    5: `${currentPlayer.name}の指導者経歴（コーチ・監督歴など）を教えてください。JSONで{"type":"sub","title":"指導者経歴","content":"内容"}で返してください。`,
  };

  // Remove old sub panel
  const old = document.getElementById('sub-panel');
  if(old) old.remove();

  setLoading(true);
  try {
    const raw = await callClaude(prompts[cmd]);
    const data = extractJSON(raw);
    renderSubPanel(data);
  } catch(e) {
    const panel = document.createElement('div');
    panel.id = 'sub-panel';
    panel.className = 'sub-panel';
    panel.innerHTML = `<p style="color:var(--muted)">データを取得できませんでした</p>`;
    document.getElementById('sub-cmds-wrap').after(panel);
  } finally {
    setLoading(false);
  }
}

function renderCandidates(data) {
  let html = `<div class="candidates">
    <div class="candidates-title">候補（文脈優先｜内海スコア）</div>`;
  data.candidates.forEach(c => {
    html += `<div class="candidate-item" onclick="selectCandidate('${c.name}')">
      <div class="cand-num">${c.num}</div>
      <div>
        <div class="cand-name">${c.name}</div>
        <div class="cand-team">${c.team}</div>
      </div>
    </div>`;
  });
  html += `</div>`;
  html += `<button class="reset-btn" onclick="resetAll()">⚾ 最初から</button>`;
  document.getElementById('result').innerHTML = html;
}

function renderPlayer(data) {
  currentPlayer = data;

  // Rank score bar (1.00=100%, 2.00=0%)
  const rankNum = parseFloat(data.rank) || 1.5;
  const pct = Math.round(Math.max(0, Math.min(100, (2.0 - rankNum) / 1.0 * 100)));

  const salaryHTML = data.salary
    ? `<div class="salary"><div class="salary-val">${data.salary}</div><div class="salary-label">最高年俸</div></div>`
    : '';

  let html = `<div class="player-card">
    <div class="player-header">
      <div class="player-entry">👉 ${data.entry}</div>
      <div class="player-name">${data.name}</div>
      <div class="player-pos">${data.position}　${data.team}</div>
    </div>
    <div class="player-body">
      <div class="rank-row">
        <div>
          <div class="rank-val">${data.rank}</div>
          <div class="rank-label">評価</div>
          <div class="score-bar-wrap">
            <div class="score-bar"><div class="score-fill" style="width:0%" data-p="${pct}"></div></div>
          </div>
        </div>
        ${salaryHTML}
      </div>
      <div class="stat-row">
        <div class="stat-label">👉 成績</div>
        <div class="stat-val">${data.stats}</div>
      </div>
      <div class="award-row">
        <div class="stat-label">🏆 受賞歴</div>
        <div class="award-val">${data.awards}</div>
      </div>
      <div class="song-row">
        <div class="stat-label">🎤 応援歌</div>
        <div class="song-val">${data.song}</div>
      </div>
    </div>
  </div>

  <div id="sub-cmds-wrap">
    <div class="sub-cmds">
      <button class="sub-btn" onclick="doSubCmd(1,'学歴')">1 学歴</button>
      <button class="sub-btn" onclick="doSubCmd(2,'理由')">2 理由</button>
      <button class="sub-btn" onclick="doSubCmd(3,'要約')">3 要約</button>
      <button class="sub-btn" onclick="doSubCmd(4,'タイプ')">4 タイプ</button>
      <button class="sub-btn" onclick="doSubCmd(5,'指導')">5 指導</button>
      <button class="sub-btn" onclick="resetAll()" style="color:var(--red);">0 戻る</button>
    </div>
  </div>`;

  document.getElementById('result').innerHTML = html;

  // Animate score bar
  setTimeout(() => {
    document.querySelectorAll('.score-fill').forEach(el => el.style.width = el.dataset.p + '%');
  }, 100);
}

function renderSubPanel(data) {
  const panel = document.createElement('div');
  panel.id = 'sub-panel';
  panel.className = 'sub-panel';
  panel.innerHTML = `<div class="sub-panel-title">${data.title}</div><p>${data.content}</p>`;
  document.getElementById('sub-cmds-wrap').after(panel);
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function resetAll() {
  currentPlayer = null;
  currentSubCmd = null;
  conversationHistory = [];
  document.getElementById('result').innerHTML = '';
  document.getElementById('search').value = '';
  document.getElementById('search').focus();
}

function setLoading(on) {
  document.getElementById('loading').classList.toggle('on', on);
}
</script>
</body>
</html>
