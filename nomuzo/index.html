<style>
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#242424;--gold:#c9a84c;--gold2:#f0c96e;--red:#c0392b;--red2:#e74c3c;--text:#e8e0d0;--muted:#555;--muted2:#888;--border:#2a2a2a;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;padding-bottom:80px;}
header{background:linear-gradient(180deg,#080808,#111);border-bottom:2px solid var(--gold);padding:16px 20px 12px;text-align:center;position:sticky;top:0;z-index:100;}
.logo{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:3px;opacity:0.8;}

.back-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:11px;text-decoration:none;opacity:0.7;}

.pdf-drop{border:2px dashed var(--border);border-radius:8px;padding:28px 16px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
.pdf-drop:hover,.pdf-drop.drag{border-color:var(--gold);background:rgba(201,168,76,0.05);}
.pdf-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:30px;margin-bottom:8px;}
.drop-txt{font-size:13px;color:var(--muted2);line-height:1.7;}
.drop-txt strong{color:var(--gold);}
.pdf-st{display:none;align-items:center;gap:10px;padding:11px 13px;background:rgba(201,168,76,0.07);border-radius:8px;margin-top:10px;}
.pdf-st.on{display:flex;}
.st-ico{font-size:18px;}
.st-name{font-size:12px;color:var(--gold);font-weight:700;}
.st-det{font-size:10px;color:var(--muted2);margin-top:2px;}
.btn-row{display:flex;gap:10px;margin-top:12px;}
.btn{flex:1;padding:13px;border:none;border-radius:10px;font-family:'Noto Serif JP',serif;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.15s;font-size:13px;}

.rc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.rc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--red));}
.rc-title{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;}

.rc ul li:last-child{border-bottom:none;}

.ri-info{flex:1;min-width:0;}

.ri-badge{font-size:10px;color:var(--muted2);margin-right:5px;}

.ri-bw{display:flex;align-items:center;gap:8px;margin-top:6px;}
.ri-bar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.ri-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--gold));transition:width 1s cubic-bezier(0.4,0,0.2,1);}

.ri-score small{font-size:10px;color:var(--muted2);}
footer{text-align:center;padding:20px;font-size:10px;color:var(--muted);letter-spacing:1px;line-height:2;}
footer em{color:var(--gold);font-style:normal;}
</style>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const CIRCLE={};
'①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱'.split('').forEach((c,i)=>CIRCLE[c]=i+1);

let raceData={};

function onDrop(e){e.preventDefault();document.getElementById('drop').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)procPdf(f);}
function onSel(e){const f=e.target.files[0];if(f)procPdf(f);}

async function procPdf(file){
  setSt('⏳',file.name,'PDFを読み込んでいます…');
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    
    // Extract text preserving line structure via y-coordinate grouping
    const allLines=[];
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      // Group items by y-coordinate (rounded to nearest 2px)
      const yMap={};
      for(const item of tc.items){
        if(!item.str) continue;
        const y=Math.round(item.transform[5]/2)*2;
        if(!yMap[y]) yMap[y]=[];
        yMap[y].push(item.str);
      }
      const ys=Object.keys(yMap).map(Number).sort((a,b)=>b-a);
      for(const y of ys){
        allLines.push(yMap[y].join(' '));
      }
    }
    parsePdf(allLines, file.name);
  }catch(err){
    setSt('❌','エラー',err.message);
  }
}

function parsePdf(lines, fname){
  // Race info
  let race_name='', race_date='', race_course='';
  for(let li=0;li<Math.min(lines.length,80);li++){
    const ln=lines[li];
    if(!race_date){const m=ln.match(/(\d{4}\/\d{1,2}\/\d{1,2})/);if(m)race_date=m[1];}
    if(!race_course){const m=ln.match(/芝(\d{4})m\s*(\d{1,2})頭/);if(m)race_course=`芝${m[1]}m ${m[2]}頭`;}
    // Race name: line after "11R" that contains kanji/katakana race name
    if(!race_name && /^\d+R$/.test(ln.trim())){
      const next=lines[li+1]||'';
      const m=next.match(/^([\u4e00-\u9fffァ-ヶー]+[賞特別記念カップ])/);
      if(m)race_name=m[1].trim();
    }
    if(!race_name){
      const m=ln.match(/([\u4e00-\u9fff]{2,}[賞特別記念])/);
      if(m&&!ln.includes('競馬')&&!ln.includes('データ'))race_name=m[1];
    }
  }

  // Find horse names: pure katakana lines followed by "--人気/--⼈気" within next 6 lines
  const horses=[];
  for(let i=0;i<lines.length;i++){
    const ln=lines[i].trim();
    if(/^[ァ-ヶー]{3,}$/.test(ln)){
      const nearby=lines.slice(i+1,i+7).join('\n');
      if(/--/.test(nearby)){
        // Find next horse index
        let nextIdx=lines.length;
        for(let j=i+5;j<lines.length;j++){
          if(/^[ァ-ヶー]{3,}$/.test(lines[j].trim())){
            const nb=lines.slice(j+1,j+7).join('\n');
            if(/--/.test(nb)){nextIdx=j;break;}
          }
        }
        const section=lines.slice(i,nextIdx);
        horses.push({name:ln, lineIdx:i, section});
        i=nextIdx-1;
      }
    }
  }

  const parsed=horses.map((h,idx)=>{
    const sec=h.section;
    // 馬番: "X Y ---" pattern (枠番 馬番 ---)
    let banum=String(idx+1);
    for(const ln of sec){
      const m=ln.trim().match(/^(\d)\s+(\d{1,2})\s+---/);
      if(m){banum=m[2];break;}
    }
    // 前走着順: "騎手：X%[N] Z ..." → first number Z (1-18) after %[N]
    let zenso_result=0;
    for(const ln of sec.slice(0,6)){
      const m=ln.match(/騎[手⼿][：:]\s*[\d.]+%\[\d+\]\s+(\d{1,2})/);
      if(m){
        const v=parseInt(m[1]);
        if(v>=1&&v<=18){zenso_result=v;break;}
      }
    }
    // 4角位置: 4 consecutive circled numbers → last one
    let corner4=0;
    for(const ln of sec){
      const m=ln.match(/[①-⑱]{4}/);
      if(m){corner4=CIRCLE[m[0][3]]||0;break;}
    }
    // 父馬名: "(---kg)" の前のカタカナ or 騎手行の末尾カタカナ
    let father='不明';
    for(const ln of sec){
      // Pattern 1: "父馬名 (---kg)"
      const m1=ln.match(/([ァ-ヶーA-Za-z\u4e00-\u9fff]{2,15})\s*\(---kg\)/);
      if(m1&&!/[0-9]/.test(m1[1])){father=m1[1].trim();break;}
    }
    if(father==='不明'){
      for(const ln of sec){
        // Pattern 2: jockey line ends with father name "◁◁◀◁ キタサンブラック"  
        const m2=ln.match(/[◁◀]+\s+([ァ-ヶーA-Za-z\u4e00-\u9fff]{3,15})\s*$/);
        if(m2){father=m2[1].trim();break;}
        // Pattern 3: standalone father name line after "---kg 父馬："
        const m3=ln.match(/---kg\s+[父⽗][⾺馬][：:]/);
        if(m3){
          // next line might have father name
          const idx2=sec.indexOf(ln);
          if(idx2>=0&&idx2+1<sec.length){
            const nextLn=sec[idx2+1];
            const m4=nextLn.match(/^([ァ-ヶーA-Za-z\u4e00-\u9fff]{2,15})/);
            if(m4)father=m4[1].trim();
          }
          break;
        }
      }
    }
    // コース適性: 当該/東芝 W P S X
    let tekisei=30;
    for(const ln of sec){
      const tm=ln.match(/当該\s+(\d)\s+(\d)\s+(\d)\s+(\d)/);
      const tzm=ln.match(/東芝\s+(\d)\s+(\d)\s+(\d)\s+(\d)/);
      if(tm)tekisei+=parseInt(tm[1])*4+parseInt(tm[2])*2;
      if(tzm)tekisei+=parseInt(tzm[1])*3+parseInt(tzm[2])*1;
    }
    tekisei=Math.min(40,Math.max(25,tekisei));
    // 全成績: 全 W P S X
    let noryoku=27;
    for(const ln of sec.slice(0,3)){
      const m=ln.match(/全\s+(\d)\s+(\d)\s+(\d)\s+(\d)/);
      if(m){
        const w=parseInt(m[1]),top3=parseInt(m[1])+parseInt(m[2])+parseInt(m[3]);
        noryoku=Math.min(35,Math.max(20,20+w*4+top3));break;
      }
    }
    // 実行力: 前走着順ベース
    let jikkoryoku=17;
    if(zenso_result===1)jikkoryoku=24;
    else if(zenso_result===2)jikkoryoku=22;
    else if(zenso_result===3)jikkoryoku=20;
    else if(zenso_result<=5)jikkoryoku=18;
    else if(zenso_result<=8)jikkoryoku=14;
    else if(zenso_result<=15)jikkoryoku=11;
    else jikkoryoku=10;

    const score=Math.round((tekisei*noryoku*jikkoryoku)/35);
    return{banum,name:h.name,father,corner4,zenso_result,tekisei,noryoku,jikkoryoku,score};
  });

  raceData={race_name,race_date,race_course,horses:parsed};
  const n=parsed.length;
  setSt('✅',fname,`${race_name||'レース'} / ${n}頭 読取完了`);
  document.getElementById('gobtn').disabled=(n===0);
}

function getKq(c4){
  const c=parseInt(c4)||0;
  if(c===0)return'不明';
  if(c<=2)return'逃';
  if(c<=5)return'先';
  if(c<=10)return'差';
  return'追';
}

function getTenkai(horses){
  const sc=[...horses].sort((a,b)=>b.score-a.score);
  const top5=sc.slice(0,5).map(h=>({...h,kq:getKq(h.corner4)}));
  const nige=top5.filter(h=>h.kq==='逃').length;
  const sen=top5.filter(h=>h.kq==='先').length;
  let pattern,desc;
  if(nige===0&&sen>=2){pattern='①スロー前残り';desc='逃げ不在・先行多数。スローで前が残りやすい。';}
  else if(nige===1&&sen>=2){pattern='①スロー前残り';desc='逃げ1頭・先行複数で前有利。';}
  else if(nige>=2&&nige<=3){pattern='②平均〜やや速';desc=`逃げ${nige}頭の競り合い。差しも届く。`;}
  else if(nige>=4){pattern='③ハイ差し';desc=`逃げ${nige}頭のハイペース。差し追い込み有利。`;}
  else{pattern='④瞬発戦';desc='先行手薄。スローからの瞬発力勝負。';}
  return{pattern,desc,nige,sen,top5};
}

async function analyze(){
  if(!raceData.horses||raceData.horses.length===0){alert('PDFを読み込んでください');return;}
  document.getElementById('inp').style.display='none';
  document.getElementById('res').style.display='none';
  setLoad(true,'🍶 呑蔵AI 分析中…','コメント生成中');
  try{
    const horses=raceData.horses.map(h=>({...h,kq:getKq(h.corner4)}));
    const scored=[...horses].sort((a,b)=>b.score-a.score).map((h,i)=>({...h,rank:i+1}));
    const tenkai=getTenkai(horses);
    const ai=await callAI(scored,tenkai);
    render(ai,scored,tenkai);
  }catch(err){
    document.getElementById('inp').style.display='block';
    alert('エラー: '+err.message);
  }finally{setLoad(false);}
}

async function callAI(scored,tenkai){
  const horseList=scored.map(h=>`${h.banum}番 ${h.name} 父:${h.father} 脚質:${h.kq} 前走${h.zenso_result||'?'}着 ${h.score}pt`).join('\n');
  const prompt=`「呑蔵競馬」AIです。居酒屋トーン・断定・短文で語ってください。

レース：${raceData.race_name}　コース：${raceData.race_course}
展開：${tenkai.pattern}（${tenkai.desc}）

全馬スコア順：
${horseList}

【ルール】展・コ・煽は脚質と役割のみ（馬名・馬番禁止）。全のみ馬名OK。展とコは同じ結論。煽は揺さぶり。通はコース傾向・血統知識で3つ。突はツッコミ返し。言は格言3つ。名は馬名考察3つ。

JSONのみ（コードブロック不要）：
{"tenkai":"","comment":["","",""],"aori":["","",""],"tsu":["","",""],"tsukomi":["","",""],"kotoba":["","",""],"namaae":["","",""]}`;

  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  const raw=d.content?.map(b=>b.text||'').join('')||'';
  const s=raw.replace(/```json|```/g,'').trim();
  return JSON.parse(s.substring(s.indexOf('{'),s.lastIndexOf('}')+1));
}

function render(ai,scored,tenkai){
  document.getElementById('rbtitle').textContent=raceData.race_name||'レース';
  document.getElementById('rbsub').textContent=[raceData.race_date,raceData.race_course].filter(Boolean).join(' · ');
  document.getElementById('rbadge').classList.add('on');

  const kqCls=k=>k==='逃'?'kq-nige':k==='先'?'kq-sen':k==='差'?'kq-sa':k==='追'?'kq-oi':'kq-fu';
  const kqHtml=tenkai.top5.map(h=>`<span class="kq-tag ${kqCls(h.kq)}">${h.kq}</span>`).join('');

  document.getElementById('c0').innerHTML=`<div class="tpat"><div class="tpat-label">上位5頭の脚質</div><div class="tpat-row">${kqHtml}</div></div><p>${tenkai.pattern}<br>${ai.tenkai}</p>`;
  document.getElementById('c1').innerHTML=`<p>${ai.tenkai}</p>${ul(ai.comment)}`;
  document.getElementById('c2').innerHTML=ul(ai.aori);
  document.getElementById('c3').innerHTML=ul(ai.tsu);
  document.getElementById('c5').innerHTML=ul(ai.tsukomi);
  document.getElementById('c6').innerHTML=ul(ai.kotoba);
  document.getElementById('c7').innerHTML=ul(ai.namaae);

  const mx=Math.max(...scored.map(h=>h.score));
  document.getElementById('c4').innerHTML=scored.map((h,i)=>{
    const pct=Math.round((h.score/mx)*100);
    const cls=i===0?'r1':i===1?'r2':i===2?'r3':'rx';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':h.rank;
    return`<div class="ri ${cls}"><div class="ri-medal">${medal}</div><div class="ri-info"><div class="ri-name"><span class="ri-badge">${h.banum}番</span>${h.name} <span class="kq-tag ${kqCls(h.kq)}" style="font-size:9px;padding:2px 6px;">${h.kq}</span></div><div class="ri-sub">父:${h.father} · 適性${h.tekisei} · 能力${h.noryoku} · 実行力${h.jikkoryoku}</div><div class="ri-bw"><div class="ri-bar"><div class="ri-fill" style="width:0%" data-p="${pct}"></div></div><div class="ri-score">${h.score}<small>pt</small></div></div></div></div>`;
  }).join('');

  document.getElementById('res').style.display='block';
  setTimeout(()=>document.querySelectorAll('.ri-fill').forEach(el=>el.style.width=el.dataset.p+'%'),50);
  tab(0);
}

function ul(items){return`<ul>${(items||[]).map(t=>`<li>${t}</li>`).join('')}</ul>`;}
function tab(n){document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',i===n));document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('on',i===n));}
function setLoad(on,txt,sub){document.getElementById('loading').classList.toggle('on',on);if(txt)document.getElementById('ltxt').textContent=txt;if(sub)document.getElementById('lsub').textContent=sub;}
function setSt(ico,name,det){document.getElementById('pst').classList.add('on');document.getElementById('stico').textContent=ico;document.getElementById('stname').textContent=name;document.getElementById('stdet').textContent=det;}
function resetAll(){raceData={};document.getElementById('pfile').value='';document.getElementById('pst').classList.remove('on');document.getElementById('gobtn').disabled=true;document.getElementById('res').style.display='none';document.getElementById('rbadge').classList.remove('on');document.getElementById('inp').style.display='block';setLoad(false);tab(0);}
</script>
</body>
</html>
