<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍶 呑蔵競馬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="../apikey.js"></script>
<style>
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#242424;
  --gold:#c9a84c;--gold2:#f0c96e;--red:#c0392b;--red2:#e74c3c;
  --text:#e8e0d0;--muted:#555;--muted2:#888;--border:#2a2a2a;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;padding-bottom:80px;}

header{background:linear-gradient(180deg,#080808,#111);border-bottom:2px solid var(--gold);padding:16px 20px 12px;text-align:center;position:sticky;top:0;z-index:100;}
.logo{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:3px;opacity:0.8;}
header h1{font-size:26px;font-weight:900;color:var(--text);letter-spacing:2px;}
header h1 em{color:var(--gold);font-style:normal;}
.vbadge{font-size:9px;letter-spacing:2px;color:var(--muted2);border:1px solid #333;padding:2px 10px;border-radius:20px;margin-top:5px;display:inline-block;text-transform:uppercase;}
.back-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:11px;text-decoration:none;opacity:0.7;}

.wrap{max-width:480px;margin:0 auto;padding:18px 14px;}

/* PDF DROP */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:12px;letter-spacing:1px;}

.pdf-drop{border:2px dashed var(--border);border-radius:8px;padding:28px 16px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
.pdf-drop:hover,.pdf-drop.drag{border-color:var(--gold);background:rgba(201,168,76,0.05);}
.pdf-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:30px;margin-bottom:8px;}
.drop-txt{font-size:13px;color:var(--muted2);line-height:1.7;}
.drop-txt strong{color:var(--gold);}

.pdf-st{display:none;align-items:center;gap:10px;padding:11px 13px;background:rgba(201,168,76,0.07);border-radius:8px;margin-top:10px;}
.pdf-st.on{display:flex;}
.st-ico{font-size:18px;}
.st-name{font-size:12px;color:var(--gold);font-weight:700;}
.st-det{font-size:10px;color:var(--muted2);margin-top:2px;}

.thumbs-wrap{display:none;margin-top:10px;}
.thumbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.thumb{flex-shrink:0;width:72px;border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.thumb img{width:100%;display:block;}
.thumb-n{text-align:center;font-size:9px;color:var(--muted2);padding:2px 0;background:var(--bg3);}

/* BUTTONS */
.btn-row{display:flex;gap:10px;margin-top:12px;}
.btn{flex:1;padding:13px;border:none;border-radius:10px;font-family:'Noto Serif JP',serif;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.15s;font-size:13px;}
.btn:disabled{opacity:0.3;cursor:not-allowed;}
.btn-go{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;font-size:15px;}
.btn-go:hover:not(:disabled){opacity:0.9;transform:translateY(-1px);}
.btn-rst{background:transparent;color:var(--muted2);border:1px solid var(--border);font-size:11px;flex:0 0 auto;width:80px;}

/* LOADING */
.loading{display:none;text-align:center;padding:50px 0;}
.loading.on{display:block;}
.ring{width:46px;height:46px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{color:var(--gold);font-size:13px;letter-spacing:2px;animation:pulse 1.4s ease-in-out infinite;}
.lsub{margin-top:8px;color:var(--muted2);font-size:11px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* RACE BADGE */
.rbadge{background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(192,57,43,0.05));border:1px solid rgba(201,168,76,0.3);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:none;align-items:center;gap:12px;}
.rbadge.on{display:flex;}
.rb-info{flex:1;}
.rb-title{font-size:15px;font-weight:900;color:var(--text);}
.rb-sub{font-size:11px;color:var(--muted2);margin-top:3px;}
.rb-close{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:18px;padding:4px;}

/* TABS */
.tab-nav{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:14px;gap:2px;overflow-x:auto;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;min-width:38px;padding:8px 3px;background:transparent;border:none;border-radius:9px;color:var(--muted2);font-family:'Noto Serif JP',serif;font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.2s;}
.tab-btn.on{background:var(--bg3);color:var(--gold);border:1px solid rgba(201,168,76,0.25);}
.tab-btn span{display:block;font-size:15px;margin-bottom:2px;}

.panel{display:none;}
.panel.on{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.rc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.rc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--red));}
.rc-title{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;}
.rc p{font-size:14px;line-height:2.1;font-weight:700;color:var(--text);}
.rc ul{list-style:none;padding:0;}
.rc ul li{font-size:13px;line-height:1.9;color:var(--text);padding:8px 0 8px 18px;border-bottom:1px solid var(--border);position:relative;}
.rc ul li::before{content:'▸';position:absolute;left:0;color:var(--gold);font-size:10px;top:10px;}
.rc ul li:last-child{border-bottom:none;}

/* TENKAI VISUAL */
.tenkai-pattern{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:12px;}
.tenkai-label{font-size:10px;color:var(--muted2);letter-spacing:2px;margin-bottom:8px;}
.tenkai-row{display:flex;gap:6px;flex-wrap:wrap;}
.tenkai-tag{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.tag-nige{background:rgba(192,57,43,0.2);color:#e74c3c;border:1px solid rgba(192,57,43,0.3);}
.tag-senkou{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.tag-sashi{background:rgba(52,152,219,0.15);color:#3498db;border:1px solid rgba(52,152,219,0.3);}
.tag-oikomi{background:rgba(46,204,113,0.15);color:#2ecc71;border:1px solid rgba(46,204,113,0.3);}

/* RANKING */
.ri{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:12px;}
.ri:last-child{border-bottom:none;}
.ri-medal{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;min-width:36px;text-align:center;}
.r1 .ri-medal{color:var(--gold2);}
.r2 .ri-medal{color:#c0c0c0;}
.r3 .ri-medal{color:#cd7f32;}
.rx .ri-medal{color:var(--muted2);font-size:15px;}
.ri-info{flex:1;min-width:0;}
.ri-name{font-size:14px;font-weight:700;color:var(--text);}
.ri-badge{font-size:10px;color:var(--muted2);margin-right:5px;}
.ri-sub{font-size:10px;color:var(--muted2);margin-top:3px;}
.ri-bw{display:flex;align-items:center;gap:8px;margin-top:6px;}
.ri-bar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.ri-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--gold));transition:width 1s cubic-bezier(0.4,0,0.2,1);}
.ri-score{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;color:var(--gold);min-width:58px;text-align:right;}
.ri-score small{font-size:10px;color:var(--muted2);}

footer{text-align:center;padding:20px;font-size:10px;color:var(--muted);letter-spacing:1px;line-height:2;}
footer em{color:var(--gold);font-style:normal;}
</style>
</head>
<body>

<header>
  <a class="back-btn" href="../index.html">‹ TOP</a>
  <div class="logo">Nomuzo · Prediction Engine</div>
  <h1>🍶 呑蔵<em>競馬</em></h1>
  <div class="vbadge">v4.0 · PDF Vision AI</div>
</header>

<div class="wrap">
<div id="inp">
  <div class="card">
    <div class="card-title">📄 競馬ラボ PDF 取込</div>
    <div class="pdf-drop" id="drop"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="onDrop(event)">

      <div class="drop-icon">📂</div>
      <div class="drop-txt"><strong>PDFをタップして選択</strong><br>または ドラッグ＆ドロップ<br><span style="font-size:10px;color:#555;">競馬ラボ横型馬柱PDF対応</span></div>

    <div class="pdf-st" id="pst">

  <div class="ltxt" id="ltxt">🍶 呑蔵AI 分析中…</div>

<div id="res" style="display:none;">
  <div class="rbadge" id="rbadge">

    <div class="rb-info">
      <div class="rb-title" id="rbtitle">—</div>

  <div class="tab-nav">
    <button class="tab-btn on" onclick="tab(0)"><span>⚡</span>展</button>
    <button class="tab-btn" onclick="tab(1)"><span>🍺</span>コ</button>

</div>

<footer>🍶 <em>呑蔵競馬</em> — 飲みながら楽しむ予想エンジン<br>馬券購入は自己責任で。飲みすぎにもご注意を。</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pages = [], raceData = {};

function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') procPdf(f);
}
function onSel(e) { const f = e.target.files[0]; if (f) procPdf(f); }

async function procPdf(file) {
  setSt('⏳', file.name, 'PDFを読み込んでいます…');
  document.getElementById('drop').style.pointerEvents = 'none';
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    const total = pdf.numPages;
    setSt('🖼️', file.name, `${total}ページ — 画像変換中…`);
    pages = [];
    const thumbsEl = document.getElementById('thumbs');
    thumbsEl.innerHTML = '';
    document.getElementById('twrap').style.display = 'block';

    for (let i = 1; i <= total; i++) {
      const page = await pdf.getPage(i);
      const vp = page.getViewport({scale: 2.0});
      const c = document.createElement('canvas');
      c.width = vp.width; c.height = vp.height;
      await page.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
      pages.push(c.toDataURL('image/jpeg', 0.85).split(',')[1]);

      const tc = document.createElement('canvas');
      const tv = page.getViewport({scale: 0.15});
      tc.width = tv.width; tc.height = tv.height;
      await page.render({canvasContext: tc.getContext('2d'), viewport: tv}).promise;
      const d = document.createElement('div');
      d.className = 'thumb';
      d.innerHTML = `<img src="${tc.toDataURL('image/jpeg', 0.7)}"><div class="thumb-n">${i}P</div>`;
      thumbsEl.appendChild(d);
      setSt('🖼️', file.name, `${i}/${total} ページ変換中…`);
    }

    setSt('🤖', file.name, 'AIが馬柱を読み取り中…');
    await readPdf(file.name);
  } catch(err) {
    setSt('❌', 'エラー', err.message);
    document.getElementById('drop').style.pointerEvents = 'auto';
  }
}

async function readPdf(fname) {
  const content = [];
  pages.slice(0, Math.min(3, pages.length)).forEach((b64, i) => {
    content.push({type:'image', source:{type:'base64', media_type:'image/jpeg', data:b64}});
    content.push({type:'text', text:`競馬ラボ馬柱PDF ${i+1}ページ目です。`});
  });

  content.push({type:'text', text:`この競馬ラボ横型馬柱PDFから以下を抽出してください。
JSONのみ返してください（コードブロック不要）:
{
  "race_name": "レース名",
  "race_date": "開催日",
  "race_course": "コース（例:東京芝2400m 18頭）",
  "horses": [
    {
      "banum": "馬番",
      "name": "馬名",
      "father": "父馬名",
      "corner4": "前走4角位置（数字、不明なら0）",
      "zenso_class": "前走クラス",
      "zenso_result": "前走着順"
    }
  ]
}`});

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      messages: [{role:'user', content}]
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  const raw = d.content?.map(b=>b.text||'').join('') || '';

  try {
    raceData = JSON.parse(raw.replace(/```json|```/g,'').trim());
    setSt('✅', fname, `${raceData.race_name||'レース'} / ${raceData.horses?.length||0}頭 読取完了`);
    document.getElementById('gobtn').disabled = false;
  } catch(e) {
    setSt('⚠️', fname, 'データ解析完了（一部）');
    document.getElementById('gobtn').disabled = false;
  }
  document.getElementById('drop').style.pointerEvents = 'auto';
}

function setSt(ico, name, det) {
  document.getElementById('pst').classList.add('on');
  document.getElementById('stico').textContent = ico;
  document.getElementById('stname').textContent = name;
  document.getElementById('stdet').textContent = det;
}

// ── 脚質判定 ─────────────────────────────────
function getKyakushitsu(corner4) {
  const c = parseInt(corner4) || 0;
  if (c === 0) return '不明';
  if (c <= 3) return '逃';
  if (c <= 6) return '先';
  if (c <= 10) return '差';
  return '追';
}

// ── 展開パターン判定 ──────────────────────────
function getTenkai(horses) {
  if (!horses || horses.length === 0) return {pattern:'不明', desc:'データなし'};

  // Score each horse first (temp)
  const scored = horses.map(h => ({...h, kq: getKyakushitsu(h.corner4)}));

  // Count by type among top 5 (by position order for now)
  const top5 = scored.slice(0, 5);
  const nige = top5.filter(h => h.kq === '逃').length;
  const senkou = top5.filter(h => h.kq === '先').length;

  let pattern, desc;
  if (nige === 0 && senkou >= 3) {
    pattern = '①スロー前残り';
    desc = '逃げ不在・先行多数。スローペースで前が残りやすい。';
  } else if (nige >= 1 && senkou >= 2) {
    pattern = '①スロー前残り';
    desc = '逃げ1頭・先行複数。平均ペースで前有利。';
  } else if (nige >= 2 && nige <= 3) {
    pattern = '②平均〜やや速';
    desc = `逃げ${nige}頭の競り合い。平均〜やや速めのペースで差しも届く。`;
  } else if (nige >= 4) {
    pattern = '③ハイ差し';
    desc = `逃げ${nige}頭のハイペース。差し・追い込み有利。`;
  } else {
    pattern = '④瞬発戦';
    desc = '先行手薄。スローからの瞬発力勝負。';
  }
  return {pattern, desc, nige, senkou, top5};
}

// ── 評価スコア計算 ────────────────────────────
function calcScore(horse) {
  // 適性 25-40
  let tekisei = 32;
  // 能力 20-35
  let noryoku = 27;
  // 実行力 10-25（前走結果ベース）
  let jikkoryoku = 17;

  const result = parseInt(horse.zenso_result) || 10;
  if (result === 1) jikkoryoku = 24;
  else if (result === 2) jikkoryoku = 22;
  else if (result === 3) jikkoryoku = 20;
  else if (result <= 5) jikkoryoku = 18;
  else if (result <= 8) jikkoryoku = 14;
  else jikkoryoku = 10;

  const score = Math.round((tekisei * noryoku * jikkoryoku) / 35);
  return {tekisei, noryoku, jikkoryoku, score};
}

// ── ANALYZE ──────────────────────────────────
async function analyze() {
  if (!raceData.horses) { alert('PDFを読み込んでください'); return; }

  document.getElementById('inp').style.display = 'none';
  document.getElementById('res').style.display = 'none';
  setLoad(true, '🍶 呑蔵AI 分析中…', 'スコア計算・展開判定中');

  try {
    // 脚質付与
    const horses = raceData.horses.map(h => ({
      ...h,
      kq: getKyakushitsu(h.corner4)
    }));

    // スコア計算
    const scored = horses.map(h => {
      const s = calcScore(h);
      return {...h, ...s};
    }).sort((a,b) => b.score - a.score).map((h,i) => ({...h, rank: i+1}));

    // 展開判定
    const tenkai = getTenkai(horses);

    // AI分析
    setLoad(true, '🍶 呑蔵AI 分析中…', 'AIが語録・コメントを生成中');
    const result = await callAI(scored, tenkai);
    render(result, scored, tenkai);

  } catch(err) {
    document.getElementById('inp').style.display = 'block';
    alert('エラー: ' + err.message);
  } finally {
    setLoad(false);
  }
}

async function callAI(scored, tenkai) {
  const top5 = scored.slice(0, 5);
  const horseSummary = scored.map(h =>
    `${h.banum}番 ${h.name}（父:${h.father}）脚質:${h.kq} 前走:${h.zenso_result||'?'}着 スコア:${h.score}`
  ).join('\n');

  const prompt = `あなたは「呑蔵競馬」の予想AIです。以下のデータを分析してください。

レース：${raceData.race_name||''}　コース：${raceData.race_course||''}

展開パターン：${tenkai.pattern}
展開説明：${tenkai.desc}

全馬データ（スコア順）：
${horseSummary}

【ルール】
- 0展・1コ・2煽は脚質・役割のみで語る（馬名・馬番禁止）
- 4全のみ馬名・馬番OK
- 0展と1コは必ず同じ前提・同じ結論
- 2煽は否定・揺さぶり
- 3通はAIの競馬知識（コース傾向・血統）を使って3つ以上
- 5突はツッコミ＋返し
- 6言は呑蔵らしい名言・格言風（3つ）
- 7名は馬名の面白い読み・意味・考察（3つ）
- 居酒屋トーン・軽く煽る・短文

JSONのみ返してください（コードブロック不要）：
{"tenkai":"展開断定1行","comment":["","",""],"aori":["","",""],"tsu":["","",""],"tsukomi":["","",""],"kotoba":["","",""],"namaae":["","",""]}`;

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      messages: [{role:'user', content: prompt}]
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  const raw = d.content?.map(b=>b.text||'').join('') || '';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

// ── RENDER ───────────────────────────────────
function render(ai, scored, tenkai) {
  // Race badge
  document.getElementById('rbtitle').textContent = raceData.race_name || 'レース';
  document.getElementById('rbsub').textContent = [raceData.race_date, raceData.race_course].filter(Boolean).join(' · ');
  document.getElementById('rbadge').classList.add('on');

  // 展開ビジュアル
  const top5 = scored.slice(0,5);
  const kqHtml = top5.map(h => {
    const cls = h.kq==='逃'?'tag-nige':h.kq==='先'?'tag-senkou':h.kq==='差'?'tag-sashi':'tag-oikomi';
    return `<span class="tenkai-tag ${cls}">${h.kq}</span>`;
  }).join('');

  document.getElementById('c0').innerHTML = `
    <div class="tenkai-pattern">
      <div class="tenkai-label">上位5頭の脚質</div>
      <div class="tenkai-row">${kqHtml}</div>
    </div>
    <p>${tenkai.pattern}<br>${ai.tenkai}</p>`;

  document.getElementById('c1').innerHTML = `<p>${ai.tenkai}</p>${ul(ai.comment)}`;
  document.getElementById('c2').innerHTML = ul(ai.aori);
  document.getElementById('c3').innerHTML = ul(ai.tsu);
  document.getElementById('c5').innerHTML = ul(ai.tsukomi);
  document.getElementById('c6').innerHTML = ul(ai.kotoba);
  document.getElementById('c7').innerHTML = ul(ai.namaae);

  // ランキング
  const mx = Math.max(...scored.map(h=>h.score));
  document.getElementById('c4').innerHTML = scored.map((h,i) => {
    const pct = Math.round((h.score/mx)*100);
    const cls = i===0?'r1':i===1?'r2':i===2?'r3':'rx';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':h.rank;
    const kqCls = h.kq==='逃'?'tag-nige':h.kq==='先'?'tag-senkou':h.kq==='差'?'tag-sashi':'tag-oikomi';
    return `<div class="ri ${cls}">
      <div class="ri-medal">${medal}</div>
      <div class="ri-info">
        <div class="ri-name"><span class="ri-badge">${h.banum}番</span>${h.name} <span class="tenkai-tag ${kqCls}" style="font-size:9px;padding:2px 6px;">${h.kq}</span></div>
        <div class="ri-sub">父:${h.father} · 適性${h.tekisei} · 能力${h.noryoku} · 実行力${h.jikkoryoku}</div>
        <div class="ri-bw">
          <div class="ri-bar"><div class="ri-fill" style="width:0%" data-p="${pct}"></div></div>
          <div class="ri-score">${h.score}<small>pt</small></div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('res').style.display = 'block';
  setTimeout(() => {
    document.querySelectorAll('.ri-fill').forEach(el => el.style.width = el.dataset.p + '%');
  }, 50);
  tab(0);
}

function ul(items) { return `<ul>${(items||[]).map(t=>`<li>${t}</li>`).join('')}</ul>`; }

function tab(n) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('on', i===n));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('on', i===n));
}

function setLoad(on, txt, sub) {
  document.getElementById('loading').classList.toggle('on', on);
  if(txt) document.getElementById('ltxt').textContent = txt;
  if(sub) document.getElementById('lsub').textContent = sub;
}

function resetAll() {
  pages = []; raceData = {};
  document.getElementById('pfile').value = '';
  document.getElementById('pst').classList.remove('on');
  document.getElementById('twrap').style.display = 'none';
  document.getElementById('thumbs').innerHTML = '';
  document.getElementById('gobtn').disabled = true;
  document.getElementById('drop').style.pointerEvents = 'auto';
  document.getElementById('res').style.display = 'none';
  document.getElementById('rbadge').classList.remove('on');
  document.getElementById('inp').style.display = 'block';
  setLoad(false);
  tab(0);
}
</script>
</body>
</html>
