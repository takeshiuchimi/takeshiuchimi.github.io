<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍶 呑蔵競馬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="../apikey.js"></script>
<style>
/* =============================================
   呑蔵競馬 v5.3 · デザイントークン
   他ページ統一用: このルートをコピーするだけ
   ============================================= */
:root{
  /* 背景 — 純黒から明るいダークへ */
  --bg:#1a1a1f;
  --bg2:#23232b;
  --bg3:#2c2c36;
  --bg4:#35353f;
  /* ゴールド */
  --gold:#d4a843;
  --gold2:#f5d06e;
  --gold-dim:rgba(212,168,67,0.15);
  /* レッド */
  --red:#c0392b;
  --red2:#e74c3c;
  /* テキスト — コントラスト強化 */
  --text:#f0ead8;
  --text2:#c8bfa8;
  --muted:#6a6a7a;
  --muted2:#9a9aaa;
  /* ボーダー — 少し明るく */
  --border:#3a3a46;
  --border2:#46465a;
  /* 脚質カラー */
  --nige:#e74c3c;
  --sen:#d4a843;
  --sa:#4a9fd4;
  --oi:#2ecc71;
  /* その他 */
  --radius:12px;
  --radius-sm:8px;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;padding-bottom:80px;}

/* ── ヘッダー ── */
header{
  background:linear-gradient(180deg,#111118,#1a1a1f);
  border-bottom:2px solid var(--gold);
  padding:14px 20px 10px;
  text-align:center;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.logo{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:3px;opacity:0.9;}
header h1{font-size:26px;font-weight:900;color:var(--text);letter-spacing:2px;}
header h1 em{color:var(--gold);font-style:normal;}
.vbadge{font-size:9px;letter-spacing:2px;color:var(--muted2);border:1px solid var(--border2);padding:2px 10px;border-radius:20px;margin-top:5px;display:inline-block;text-transform:uppercase;}
.back-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:12px;text-decoration:none;opacity:0.8;font-weight:700;}

/* ── レイアウト ── */
.wrap{max-width:480px;margin:0 auto;padding:18px 14px;}

/* ── カード ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:12px;letter-spacing:1px;}

/* ── PDFドロップ ── */
.pdf-drop{border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:30px 16px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
.pdf-drop:hover,.pdf-drop.drag{border-color:var(--gold);background:var(--gold-dim);}
.pdf-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:32px;margin-bottom:8px;}
.drop-txt{font-size:13px;color:var(--text2);line-height:1.8;}
.drop-txt strong{color:var(--gold);}
.pdf-st{display:none;align-items:center;gap:10px;padding:12px 14px;background:var(--gold-dim);border:1px solid rgba(212,168,67,0.2);border-radius:var(--radius-sm);margin-top:10px;}
.pdf-st.on{display:flex;}
.st-ico{font-size:20px;}
.st-name{font-size:12px;color:var(--gold);font-weight:700;}
.st-det{font-size:10px;color:var(--text2);margin-top:2px;}

/* ── ボタン ── */
.btn-row{display:flex;gap:10px;margin-top:12px;}
.btn{flex:1;padding:14px;border:none;border-radius:var(--radius);font-family:'Noto Serif JP',serif;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.15s;font-size:13px;}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
.btn-go{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;font-size:15px;box-shadow:0 3px 12px rgba(192,57,43,0.35);}
.btn-go:hover:not(:disabled){opacity:0.92;transform:translateY(-1px);box-shadow:0 5px 16px rgba(192,57,43,0.45);}
.btn-rst{background:transparent;color:var(--muted2);border:1px solid var(--border2);font-size:11px;flex:0 0 auto;width:84px;}
.btn-rst:hover{border-color:var(--muted2);color:var(--text);}

/* ── ローディング ── */
.loading{display:none;text-align:center;padding:50px 0;}.loading.on{display:block;}
.ring{width:46px;height:46px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{color:var(--gold);font-size:13px;letter-spacing:2px;animation:pulse 1.4s ease-in-out infinite;}
.lsub{margin-top:8px;color:var(--text2);font-size:11px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── レースバッジ ── */
.rbadge{background:linear-gradient(135deg,rgba(212,168,67,0.12),rgba(192,57,43,0.06));border:1px solid rgba(212,168,67,0.35);border-radius:var(--radius);padding:13px 16px;margin-bottom:14px;display:none;align-items:center;gap:12px;}
.rbadge.on{display:flex;}
.rb-info{flex:1;}
.rb-title{font-size:15px;font-weight:900;color:var(--text);}
.rb-sub{font-size:11px;color:var(--text2);margin-top:3px;}
.rb-close{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:20px;padding:4px;line-height:1;}

/* ── タブ ── */
.tab-nav{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:14px;gap:2px;overflow-x:auto;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;min-width:38px;padding:9px 3px;background:transparent;border:none;border-radius:9px;color:var(--muted2);font-family:'Noto Serif JP',serif;font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.2s;}
.tab-btn.on{background:var(--bg3);color:var(--gold);border:1px solid rgba(212,168,67,0.3);}
.tab-btn span{display:block;font-size:16px;margin-bottom:2px;}
.panel{display:none;}.panel.on{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── コンテンツカード ── */
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;position:relative;overflow:hidden;}
.rc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--red));}
.rc-title{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:16px;opacity:0.9;}
.rc p{font-size:14px;line-height:2.1;font-weight:700;color:var(--text);}
.rc ul{list-style:none;padding:0;}
.rc ul li{font-size:13px;line-height:1.9;color:var(--text);padding:10px 0 10px 20px;border-bottom:1px solid var(--border);position:relative;}
.rc ul li::before{content:'▸';position:absolute;left:0;color:var(--gold);font-size:11px;top:12px;}
.rc ul li:last-child{border-bottom:none;}

/* ── 展開パターン ── */
.tpat{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:14px;}
.tpat-label{font-size:10px;color:var(--muted2);letter-spacing:2px;margin-bottom:8px;}
.tpat-row{display:flex;gap:6px;flex-wrap:wrap;}

/* ── 脚質バッジ ── */
.kq{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;}
.kq-逃{background:rgba(231,76,60,0.2);color:var(--nige);border:1px solid rgba(231,76,60,0.35);}
.kq-先{background:rgba(212,168,67,0.18);color:var(--gold);border:1px solid rgba(212,168,67,0.35);}
.kq-差{background:rgba(74,159,212,0.18);color:var(--sa);border:1px solid rgba(74,159,212,0.35);}
.kq-追{background:rgba(46,204,113,0.18);color:var(--oi);border:1px solid rgba(46,204,113,0.35);}
.kq-不明{background:var(--bg4);color:var(--muted2);border:1px solid var(--border);}

/* ── ランキング行 ── */
.ri{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);gap:12px;}
.ri:last-child{border-bottom:none;}
.ri-medal{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;min-width:38px;text-align:center;}
.r1 .ri-medal{color:var(--gold2);}
.r2 .ri-medal{color:#d0d0d0;}
.r3 .ri-medal{color:#d4905a;}
.rx .ri-medal{color:var(--muted2);font-size:16px;}
.ri-info{flex:1;min-width:0;}
.ri-name{font-size:15px;font-weight:700;color:var(--text);}
.ri-badge{font-size:10px;color:var(--text2);margin-right:5px;background:var(--bg4);padding:1px 6px;border-radius:4px;}
.ri-sub{font-size:10px;color:var(--text2);margin-top:4px;line-height:1.6;}
.ri-bw{display:flex;align-items:center;gap:8px;margin-top:8px;}
.ri-bar{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.ri-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--gold));transition:width 1s cubic-bezier(0.4,0,0.2,1);}
.ri-score{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;color:var(--gold2);min-width:62px;text-align:right;}
.ri-score small{font-size:10px;color:var(--muted2);}

/* ── フッター ── */
footer{text-align:center;padding:24px;font-size:10px;color:var(--muted);letter-spacing:1px;line-height:2.2;}
footer em{color:var(--gold);font-style:normal;}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="../index.html">‹ TOP</a>
  <div class="logo">Nomuzo · Prediction Engine</div>
  <h1>🍶 呑蔵<em>競馬</em></h1>
  <div class="vbadge">v5.3 · Pure JS Parse</div>
</header>
<div class="wrap">
<div id="inp">
  <div class="card">
    <div class="card-title">📄 競馬ラボ PDF 取込</div>
    <div class="pdf-drop" id="drop"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="onDrop(event)">
      <input type="file" id="pfile" accept=".pdf,application/pdf" onchange="onSel(event)">
      <div class="drop-icon">📂</div>
      <div class="drop-txt"><strong>PDFをタップして選択</strong><br>または ドラッグ＆ドロップ<br><span style="font-size:10px;color:#555;">競馬ラボ横型馬柱PDF対応</span></div>
    </div>
    <div class="pdf-st" id="pst">
      <div class="st-ico" id="stico">⏳</div>
      <div><div class="st-name" id="stname">—</div><div class="st-det" id="stdet">—</div></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-go" id="gobtn" onclick="analyze()" disabled>🔥 分析スタート</button>
    <button class="btn btn-rst" onclick="resetAll()">リセット</button>
  </div>
</div>
<div class="loading" id="loading">
  <div class="ring"></div>
  <div class="ltxt" id="ltxt">🍶 分析中…</div>
  <div class="lsub" id="lsub">コメント生成中</div>
</div>
<div id="res" style="display:none;">
  <div class="rbadge" id="rbadge">
    <div style="font-size:20px;">🏇</div>
    <div class="rb-info">
      <div class="rb-title" id="rbtitle">—</div>
      <div class="rb-sub" id="rbsub">—</div>
    </div>
    <button class="rb-close" onclick="resetAll()">✕</button>
  </div>
  <div class="tab-nav">
    <button class="tab-btn on" onclick="tab(0)"><span>⚡</span>展</button>
    <button class="tab-btn" onclick="tab(1)"><span>🍺</span>コ</button>
    <button class="tab-btn" onclick="tab(2)"><span>🔥</span>煽</button>
    <button class="tab-btn" onclick="tab(3)"><span>🎩</span>通</button>
    <button class="tab-btn" onclick="tab(4)"><span>🏆</span>全</button>
    <button class="tab-btn" onclick="tab(5)"><span>😂</span>突</button>
    <button class="tab-btn" onclick="tab(6)"><span>💬</span>言</button>
    <button class="tab-btn" onclick="tab(7)"><span>🐴</span>名</button>
  </div>
  <div class="panel on" id="p0"><div class="rc"><div class="rc-title">⚡ 展開予想</div><div id="c0"></div></div></div>
  <div class="panel" id="p1"><div class="rc"><div class="rc-title">🍺 レースコメント</div><div id="c1"></div></div></div>
  <div class="panel" id="p2"><div class="rc"><div class="rc-title">🔥 煽りコメント</div><div id="c2"></div></div></div>
  <div class="panel" id="p3"><div class="rc"><div class="rc-title">🎩 通人の見立て</div><div id="c3"></div></div></div>
  <div class="panel" id="p4"><div class="rc"><div class="rc-title">🏆 全馬スコアランキング</div><div id="c4"></div></div></div>
  <div class="panel" id="p5"><div class="rc"><div class="rc-title">😂 ツッコミ解説</div><div id="c5"></div></div></div>
  <div class="panel" id="p6"><div class="rc"><div class="rc-title">💬 呑蔵語録</div><div id="c6"></div></div></div>
  <div class="panel" id="p7"><div class="rc"><div class="rc-title">🐴 馬名考察</div><div id="c7"></div></div></div>
</div>
</div>
<footer>🍶 <em>呑蔵競馬</em> — 飲みながら楽しむ予想エンジン<br>馬券購入は自己責任で。飲みすぎにもご注意を。</footer>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const CIRCLE={};
'①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱'.split('').forEach((c,i)=>CIRCLE[c]=i+1);
// ⼈ = U+2F08 (CJK Radical), 人 = U+4EBA, 気 = U+6C17
const JINKI = '\u2f08\u6c17'; // ⼈気
const JINKI2 = '\u4eba\u6c17'; // 人気

let raceData={};

function onDrop(e){
  e.preventDefault();
  document.getElementById('drop').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f) procPdf(f);
}
function onSel(e){const f=e.target.files[0];if(f) procPdf(f);}

async function procPdf(file){
  setSt('⏳',file.name,'PDFを読み込んでいます…');
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    // Extract lines grouped by y-coordinate
    const yMap={};
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      for(const item of tc.items){
        if(!item.str||!item.str.trim()) continue;
        const y=Math.round(item.transform[5]/2)*2;
        if(!yMap[y]) yMap[y]=[];
        yMap[y].push(item.str);
      }
    }
    const ys=Object.keys(yMap).map(Number).sort((a,b)=>b-a);
    const L=ys.map(y=>yMap[y].join(''));
    parsePdf(L,file.name);
  }catch(err){
    setSt('❌','エラー',err.message);
    console.error(err);
  }
}

function parsePdf(L,fname){

  // Race info
  let race_name='',race_date='',race_course='';
  for(let i=0;i<Math.min(L.length,80);i++){
    const ln=L[i];
    if(!race_date){const m=ln.match(/(\d{4}\/\d{1,2}\/\d{1,2})/);if(m)race_date=m[1];}
    if(!race_course){const m=ln.match(/芝(\d{4})m\s*(\d{1,2})頭/);if(m)race_course=`芝${m[1]}m ${m[2]}頭`;}
    if(!race_name&&/^\d+R$/.test(ln.trim())){
      const next=(L[i+1]||'').trim();
      if(next.length>=3) race_name=next.replace(/\s+/g,'').replace(/（[^）]*）/g,'');
    }
  }

  // アンカー検出: 馬番行（行頭数字+丸数字4つ以上、各馬の前走成績行）
  const anchorsArr=[];
  for(let i=0;i<L.length;i++){
    const ln=L[i];
    // 行頭が1-2桁数字 かつ 丸数字(①-⑱)が4つ以上連続
    if(/^\d{1,2}\d/.test(ln)&&(/[\u2460-\u2471]{4}/).test(ln)){
      anchorsArr.push(i);
    }
  }
  console.log('アンカー数:', anchorsArr.length, anchorsArr.slice(0,5));
  console.log('馬番行アンカー数:', anchorsArr.length);

  // For each anchor, look back up to 6 lines for horse name
  const horses=[];
  for(const ai of anchorsArr){
    let found=false;
    for(let j=ai-1;j>=Math.max(0,ai-12);j--){
      const prev=L[j].trim();
      // ③ 純カタカナ単独行：前行に⼆〇or全が含まれれば馬名（最優先）
      if(/^[ァ-ヶー]{4,15}$/.test(prev)){
        const prevLine=(L[j-1]||'').trim();
        if(/二〇|全/.test(prevLine)){
          if(!horses.some(h=>h.name===prev)){
            horses.push({name:prev,nameIdx:j,anchorIdx:ai});
          }
          found=true;break;
        }
      }
      // ① カタカナ+数字（例: "タイダルロック2中山4..."）
      const m1=/^([ァ-ヶー]{3,15})\d/.exec(prev);
      if(m1){
        // 前行が当該/東芝行なら母名なのでスキップ
        const prevL=(L[j-1]||'').trim();
        const isHahaName=/当該|東芝|芝不|コンビ/.test(prevL)||prevL.includes('(---kg)')||prevL.includes('---kg');
        if(!isHahaName&&!horses.some(h=>h.name===m1[1])){
          horses.push({name:m1[1],nameIdx:j,anchorIdx:ai});
        }
        if(!isHahaName){found=true;break;}
      }
      // ② カタカナ+⼆〇など漢字成績（例: "パラディオン⼆〇1001..."）
      const m2=/^([ァ-ヶー]{3,15})[一-鿿⼀-⿟]/.exec(prev);
      if(m2&&!/賞|Ｓ|特別|記念|クラス|馬|騎|厩|牡|牝/.test(prev)){
        if(!horses.some(h=>h.name===m2[1])){
          horses.push({name:m2[1],nameIdx:j,anchorIdx:ai});
        }
        found=true;break;
      }
    }
  }

  // Extract data per horse
  const parsed=horses.map((h,hi)=>{
    const sec=L.slice(h.nameIdx,h.nextIdx);

    // 馬番: "枠番+馬番+---orスコア" パターン
    let banum=String(hi+1);
    for(const sl of sec){
      // パターン①: "12---" or "2497" (枠+馬番+スコアor---)
      const m=sl.trim().match(/^(\d)(\d{1,2})(?:---|\d{2})[①-⑱③]/);
      if(m){banum=m[2];break;}
      // パターン②: "1 2 ---" スペースあり
      const m2=sl.trim().match(/^(\d)\s+(\d{1,2})\s+---/);
      if(m2){banum=m2[2];break;}
    }
    // 前走着順: 騎手行(%[N])を基点に取得
    // 騎手行パターン: "騎⼿：XX.X%[N]" or "騎⼿：XX.X%[N]着順数字"
    let zenso=0;
    for(let si=0;si<sec.length&&si<10;si++){
      const sl=sec[si];
      // 騎手行を検出
      if(!/騎/.test(sl)&&!/騎/.test(sl)) continue;
      if(!/%\[/.test(sl)) continue;
      // 騎手行内に着順が含まれるケース: "%[26]14" や "%[9]1132"
      const mIn=sl.match(/%\[\d+\](\d+)/);
      if(mIn){
        const nums=mIn[1];
        const v=nums.length<=2?parseInt(nums):parseInt(nums[0]);
        if(v>=1&&v<=18){zenso=v;break;}
      }
      // 騎手行の次の行が着順行
      const nextSl=(sec[si+1]||'').trim();
      if(/^\d+$/.test(nextSl)&&nextSl.length>=1&&nextSl.length<=8){
        const v=nextSl.length<=2?parseInt(nextSl):parseInt(nextSl[0]);
        if(v>=1&&v<=18){zenso=v;break;}
      }
      break; // 騎手行は1つだけ
    }
    // 4角
    let corner4=0;
    for(const sl of sec){
      const m=sl.match(/[①-⑱]{4}/);
      if(m){corner4=CIRCLE[m[0][3]]||0;break;}
    }
    // 父馬名: \u2003 + name + (---kg)
    let father='不明';
    for(let si=0;si<sec.length;si++){
      const sl=sec[si];
      // パターン①: "キタサンブラック(---kg)ノーザン" （同一行）
      const m=sl.match(/^([\u30A1-\u30F6\u30FC\uFF21-\uFF5A]{2,20})\(---kg\)/);
      if(m&&!/当該|東芝|コンビ|騎手|馬番|父馬|種牡|調教|勝負/.test(sl)){father=m[1];break;}
      // パターン②: 単独カタカナ行 → 次行が(---kg)で始まる（例: キズナ → (---kg)サンデー）
      const m2=sl.match(/^([\u30A1-\u30F6\u30FC]{2,15})$/);
      if(m2){
        const nextSl=sec[si+1]||'';
        if(nextSl.startsWith('(---kg)')){father=m2[1];break;}
      }
    }
    // コース適性
    let tekisei=30;
    for(const sl of sec){
      const tm=sl.match(/当該\s+(\d)\s+(\d)/);
      const tzm=sl.match(/東芝\s+(\d)\s+(\d)/);
      if(tm)tekisei+=parseInt(tm[1])*4+parseInt(tm[2])*2;
      if(tzm)tekisei+=parseInt(tzm[1])*3+parseInt(tzm[2])*1;
    }
    tekisei=Math.min(40,Math.max(25,tekisei));
    // 全成績
    let noryoku=27;
    for(const sl of sec.slice(0,4)){
      const m=sl.match(/全\s+(\d)\s+(\d)\s+(\d)\s+(\d)/);
      if(m){const w=parseInt(m[1]),top3=w+parseInt(m[2])+parseInt(m[3]);noryoku=Math.min(35,Math.max(20,20+w*4+top3));break;}
    }
    // 実行力
    let jik=zenso===1?24:zenso===2?22:zenso===3?20:zenso<=5?18:zenso<=8?14:zenso<=15?11:zenso>0?10:17;
    const score=Math.round(tekisei*noryoku*jik/35);
    return{banum,name:h.name,father,corner4,zenso,tekisei,noryoku,jik,score,kq:kq(corner4)};
  });

  raceData={race_name,race_date,race_course,horses:parsed};
  const n=parsed.length;
  setSt('✅',fname,`${race_name||'レース'} / ${n}頭 読取完了`);
  document.getElementById('gobtn').disabled=(n===0);
}

function kq(c4){
  const c=parseInt(c4)||0;
  if(c===0)return'不明';if(c<=2)return'逃';if(c<=5)return'先';if(c<=10)return'差';return'追';
}

function tenkai(horses){
  const top5=[...horses].sort((a,b)=>b.score-a.score).slice(0,5);
  const nige=top5.filter(h=>h.kq==='逃').length;
  const sen=top5.filter(h=>h.kq==='先').length;
  let pat,desc;
  if(nige===0&&sen>=2){pat='①スロー前残り';desc='逃げ不在・先行多数。スローで前が残りやすい。';}
  else if(nige===1&&sen>=2){pat='①スロー前残り';desc='逃げ1頭・先行複数で前有利。';}
  else if(nige>=2&&nige<=3){pat='②平均〜やや速';desc=`逃げ${nige}頭の競り合い。差しも届く。`;}
  else if(nige>=4){pat='③ハイ差し';desc=`逃げ${nige}頭のハイペース。差し追い込み有利。`;}
  else{pat='④瞬発戦';desc='先行手薄。スローからの瞬発力勝負。';}
  return{pat,desc,nige,sen,top5};
}

async function analyze(){
  if(!raceData.horses||raceData.horses.length===0){alert('PDFを読み込んでください');return;}
  document.getElementById('inp').style.display='none';
  document.getElementById('res').style.display='none';
  setLoad(true,'🍶 AI分析中…','コメント生成中');
  try{
    const scored=[...raceData.horses].sort((a,b)=>b.score-a.score).map((h,i)=>({...h,rank:i+1}));
    const tk=tenkai(raceData.horses);
    const ai=await callAI(scored,tk);
    render(ai,scored,tk);
  }catch(err){
    document.getElementById('inp').style.display='block';
    alert('エラー: '+err.message);
  }finally{setLoad(false);}
}

async function callAI(scored,tk){
  const list=scored.map(h=>`${h.banum}番 ${h.name} 父:${h.father} 脚質:${h.kq} 前走${h.zenso||'?'}着 ${h.score}pt`).join('\n');
  const prompt=`「呑蔵競馬」AIです。居酒屋トーン・断定・短文で。

レース：${raceData.race_name}　コース：${raceData.race_course}
展開：${tk.pat}（${tk.desc}）

全馬スコア順：
${list}

【ルール】展・コ・煽は脚質と役割のみ（馬名・馬番禁止）。全のみ馬名OK。展とコは同じ結論。煽は揺さぶり。通はコース・血統知識で3つ。突は「競馬あるある」へのツッコミ3つ（必ず3つ埋めること）。言は格言3つ。名は馬名考察3つ。

JSONのみ（コードブロック不要）：
{"tenkai":"","comment":["","",""],"aori":["","",""],"tsu":["","",""],"tsukomi":["","",""],"kotoba":["","",""],"namaae":["","",""]}`;

  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  const raw=d.content?.map(b=>b.text||'').join('')||'';
  const s=raw.replace(/```json|```/g,'').trim();
  const start=s.indexOf('{');
  const end=s.lastIndexOf('}');
  if(start===-1||end===-1)throw new Error('JSONが見つかりません: '+s.substring(0,100));
  return JSON.parse(s.substring(start,end+1));
}

function render(ai,scored,tk){
  document.getElementById('rbtitle').textContent=raceData.race_name||'レース';
  document.getElementById('rbsub').textContent=[raceData.race_date,raceData.race_course].filter(Boolean).join(' · ');
  document.getElementById('rbadge').classList.add('on');

  const kqTag=k=>`<span class="kq kq-${k}">${k}</span>`;
  const kqHtml=tk.top5.map(h=>kqTag(h.kq)).join('');
  document.getElementById('c0').innerHTML=`<div class="tpat"><div class="tpat-label">上位5頭の脚質</div><div class="tpat-row">${kqHtml}</div></div><p>${tk.pat}<br>${ai.tenkai}</p>`;
  document.getElementById('c1').innerHTML=`<p>${ai.tenkai}</p>${ul(ai.comment)}`;
  document.getElementById('c2').innerHTML=ul(ai.aori);
  document.getElementById('c3').innerHTML=ul(ai.tsu);
  document.getElementById('c5').innerHTML=ul(ai.tsukomi);
  document.getElementById('c6').innerHTML=ul(ai.kotoba);
  document.getElementById('c7').innerHTML=ul(ai.namaae);

  const mx=Math.max(...scored.map(h=>h.score));
  document.getElementById('c4').innerHTML=scored.map((h,i)=>{
    const pct=Math.round(h.score/mx*100);
    const cls=i===0?'r1':i===1?'r2':i===2?'r3':'rx';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':h.rank;
    return`<div class="ri ${cls}"><div class="ri-medal">${medal}</div><div class="ri-info"><div class="ri-name"><span class="ri-badge">${h.banum}番</span>${h.name} ${kqTag(h.kq)}</div><div class="ri-sub">父:${h.father} · 適性${h.tekisei} · 能力${h.noryoku} · 実行力${h.jik}</div><div class="ri-bw"><div class="ri-bar"><div class="ri-fill" style="width:0%" data-p="${pct}"></div></div><div class="ri-score">${h.score}<small>pt</small></div></div></div></div>`;
  }).join('');

  document.getElementById('res').style.display='block';
  setTimeout(()=>document.querySelectorAll('.ri-fill').forEach(el=>el.style.width=el.dataset.p+'%'),50);
  tab(0);
}

function ul(a){return`<ul>${(a||[]).map(t=>`<li>${t}</li>`).join('')}</ul>`;}
function tab(n){document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',i===n));document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('on',i===n));}
function setLoad(on,t,s){document.getElementById('loading').classList.toggle('on',on);if(t)document.getElementById('ltxt').textContent=t;if(s)document.getElementById('lsub').textContent=s;}
function setSt(ico,n,d){document.getElementById('pst').classList.add('on');document.getElementById('stico').textContent=ico;document.getElementById('stname').textContent=n;document.getElementById('stdet').textContent=d;}
function resetAll(){raceData={};document.getElementById('pfile').value='';document.getElementById('pst').classList.remove('on');document.getElementById('gobtn').disabled=true;document.getElementById('res').style.display='none';document.getElementById('rbadge').classList.remove('on');document.getElementById('inp').style.display='block';setLoad(false);tab(0);}
</script>
