<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 PDF デバッグ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body{background:#111;color:#eee;font-family:monospace;padding:16px;font-size:12px;}
h2{color:#c9a84c;margin-bottom:12px;}
#drop{border:2px dashed #444;border-radius:8px;padding:30px;text-align:center;cursor:pointer;margin-bottom:16px;position:relative;}
#drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
#drop:hover{border-color:#c9a84c;}
#out{white-space:pre-wrap;background:#1a1a1a;padding:14px;border-radius:8px;border:1px solid #333;max-height:80vh;overflow-y:auto;line-height:1.8;}
.hit{color:#f0c96e;font-weight:bold;}
.kana{color:#2ecc71;}
.anchor{color:#e74c3c;}
.btn{background:#c9a84c;color:#111;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:bold;margin:4px;}
#controls{margin-bottom:12px;display:none;}
</style>
</head>
<body>
<h2>🔍 PDF.js 生テキスト デバッグ</h2>
<div id="drop">
  <input type="file" accept=".pdf" onchange="load(event)">
  📂 PDFをタップして選択
</div>
<div id="controls">
  <button class="btn" onclick="showAll()">全行表示</button>
  <button class="btn" onclick="showKana()">カタカナ行のみ</button>
  <button class="btn" onclick="showAnchor()">アンカー行のみ</button>
  <button class="btn" onclick="copyAll()">📋 コピー</button>
</div>
<div id="out">PDFを読み込むと結果が表示されます</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const JINKI='\u2f08\u6c17';
const JINKI2='\u4eba\u6c17';
let allLines=[];

async function load(e){
  const file=e.target.files[0];
  if(!file)return;
  document.getElementById('out').textContent='読み込み中…';
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const yMap={};
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      for(const item of tc.items){
        if(!item.str||!item.str.trim())continue;
        const y=Math.round(item.transform[5]/2)*2;
        if(!yMap[y])yMap[y]=[];
        yMap[y].push(item.str);
      }
    }
    const ys=Object.keys(yMap).map(Number).sort((a,b)=>b-a);
    allLines=ys.map((y,i)=>({
      idx:i,
      y,
      text:yMap[y].join(' '),
      raw:yMap[y]
    }));
    document.getElementById('controls').style.display='block';
    showAll();
  }catch(err){
    document.getElementById('out').textContent='エラー: '+err.message;
  }
}

function showAll(){
  const out=document.getElementById('out');
  out.innerHTML=allLines.map(l=>{
    const isAnchor=l.text.includes('--')&&(l.text.includes(JINKI)||l.text.includes(JINKI2));
    const isKana=/[ァ-ヶー]{3,}/.test(l.text);
    let cls='';
    if(isAnchor)cls='anchor';
    else if(isKana)cls='kana';
    const label=`[${String(l.idx).padStart(3,'0')}] y=${l.y} `;
    return`<span class="${cls}">${esc(label)}${esc(l.text)}</span>`;
  }).join('\n');
}

function showKana(){
  const out=document.getElementById('out');
  const filtered=allLines.filter(l=>/[ァ-ヶー]{3,}/.test(l.text));
  out.innerHTML=filtered.map(l=>{
    const label=`[${String(l.idx).padStart(3,'0')}] y=${l.y} `;
    return`<span class="kana">${esc(label)}${esc(l.text)}</span>`;
  }).join('\n');
}

function showAnchor(){
  const out=document.getElementById('out');
  const filtered=allLines.filter(l=>l.text.includes('--')&&(l.text.includes(JINKI)||l.text.includes(JINKI2)));
  out.innerHTML=filtered.map(l=>{
    const label=`[${String(l.idx).padStart(3,'0')}] y=${l.y} `;
    return`<span class="anchor">${esc(label)}${esc(l.text)}</span>`;
  }).join('\n');
}

function copyAll(){
  const text=allLines.map(l=>`[${String(l.idx).padStart(3,'0')}] y=${l.y} ${l.text}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>alert('コピーしました！'));
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
